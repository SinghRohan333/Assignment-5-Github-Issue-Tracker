<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git It Fixed - GitHub Issues Tracker</title>

    <!-- DaisyUI + Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- LOGIN PAGE -->
    <div id="loginPage" class="login-wrapper">
      <div class="login-card">
        <!-- logo + title -->
        <div class="flex flex-col items-center mb-6">
          <div class="logo-circle">
            <img
              src="./assets/github-logo.png"
              alt="GitHub Logo"
              class="logo-img"
            />
          </div>
          <h1 class="text-2xl font-bold text-gray-800 mt-4">
            GitHub Issues Tracker
          </h1>
          <p class="text-gray-500 text-sm mt-1">
            Sign in to manage your issues
          </p>
        </div>

        <!-- username -->
        <div class="field-group">
          <label class="field-label">Username</label>
          <input
            type="text"
            id="usernameInput"
            placeholder="Enter Username"
            class="field-input"
          />
          <span class="hint-text">Default: admin</span>
        </div>

        <!-- password -->
        <div class="field-group mt-4">
          <label class="field-label">Password</label>
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter Password"
            class="field-input"
          />
          <span class="hint-text">Default: admin123</span>
        </div>

        <!-- error -->
        <p id="loginError" class="text-red-500 text-sm mt-2 hidden">
          Invalid username or password.
        </p>

        <!-- sign in button -->
        <button id="signInBtn" class="signin-btn mt-5">Sign In</button>

        <!-- or divider -->
        <div class="or-divider">
          <span>OR</span>
        </div>

        <!-- demo credentials -->
        <p class="text-gray-400 text-sm text-center mb-2">Demo Credentials:</p>
        <div class="demo-box">
          <p class="text-sm text-center">
            <span class="font-bold">Username:</span> admin
          </p>
          <p class="text-sm text-center">
            <span class="font-bold">Password:</span> admin123
          </p>
        </div>
      </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage" class="hidden">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="navbar-left">
          <img src="./assets/github-logo.png" alt="logo" class="nav-logo" />
          <span class="nav-title">GitHub Issues Tracker</span>
        </div>
        <div class="navbar-right">
          <div class="search-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="search-icon"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
              />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search issues..."
              class="search-input"
            />
          </div>
          <button class="new-issue-btn">+ New Issue</button>
          <button id="logoutBtn" class="logout-btn">Log Out</button>
        </div>
      </nav>

      <!-- Skeleton Loader -->
      <div id="skeletonLoader" class="hidden skeleton-wrapper">
        <!-- skeleton navbar-like top bar -->
        <div class="skeleton-top-bar">
          <div class="skeleton h-8 w-40 rounded"></div>
          <div class="skeleton h-8 w-24 rounded"></div>
        </div>
        <!-- skeleton cards grid -->
        <div class="skeleton-grid">
          <div class="skeleton-card" *ngFor>
            <div class="skeleton h-4 w-16 rounded mb-3"></div>
            <div class="skeleton h-4 w-full rounded mb-2"></div>
            <div class="skeleton h-4 w-3/4 rounded mb-4"></div>
            <div class="skeleton h-3 w-20 rounded mb-2"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton h-4 w-16 rounded mb-3"></div>
            <div class="skeleton h-4 w-full rounded mb-2"></div>
            <div class="skeleton h-4 w-3/4 rounded mb-4"></div>
            <div class="skeleton h-3 w-20 rounded mb-2"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton h-4 w-16 rounded mb-3"></div>
            <div class="skeleton h-4 w-full rounded mb-2"></div>
            <div class="skeleton h-4 w-3/4 rounded mb-4"></div>
            <div class="skeleton h-3 w-20 rounded mb-2"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
          <div class="skeleton-card">
            <div class="skeleton h-4 w-16 rounded mb-3"></div>
            <div class="skeleton h-4 w-full rounded mb-2"></div>
            <div class="skeleton h-4 w-3/4 rounded mb-4"></div>
            <div class="skeleton h-3 w-20 rounded mb-2"></div>
            <div class="skeleton h-3 w-32 rounded"></div>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div id="mainContent" class="hidden main-content">
        <!-- Tabs -->
        <div class="tabs-wrapper">
          <button class="tab-btn active" data-tab="all">All</button>
          <button class="tab-btn" data-tab="open">Open</button>
          <button class="tab-btn" data-tab="closed">Closed</button>
        </div>

        <!-- Issue Count Bar -->
        <div class="count-bar">
          <div class="count-left">
            <img src="./assets/Aperture.png" alt="icon" class="aperture-icon" />
            <div>
              <p class="count-text" id="issueCount">0 Issues</p>
              <p class="count-subtext">Track and manage your project issues</p>
            </div>
          </div>
          <div class="count-right">
            <span class="dot green-dot"></span>
            <span class="legend-label">Open</span>
            <span class="dot purple-dot"></span>
            <span class="legend-label">Closed</span>
          </div>
        </div>

        <!-- Part 5 cards grid goes here -->
      </div>
    </div>

    <script src="./scripts.js"></script>
  </body>
</html>
